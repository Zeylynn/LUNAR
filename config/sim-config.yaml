simulation:
  tick_rate: 10
  ticks_per_snapshot: 1
  width: 40
  height: 40
  num_bushes: 80
  num_organisms: 50
  seed:

organism:
  org_stats:
    max_energy: 100
    max_food: 75
    max_water: 75
    max_speed: 0.5
    max_turn_speed: 60
    vision_level: 0.5
    mate_range: 1.5
    mate_cooldown_max: 20
    reproduction_cost: 10
  sim_stats:
    food_consumption: 0.25
    food_threshold: 25
    water_consumption: 0.25
    water_threshold: 25
    energy:
      std_gain: 2
      std_loss: 0.33
      movement_loss_factor: 0.5

neat:
  pre_train:
    num_gens: 15
    gen_ticks: 400
  eval_interval: 25
  live_mutation_strength: 0.05
  live_weight_perturb: 0.05
  live_structural_prob: 0.01
  live_add_node_prob: 0.002
  fitness_dropoff: 0.012

server:
  host: "127.0.0.1"
  port: 9001